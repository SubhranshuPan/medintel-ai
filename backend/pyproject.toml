[project]
name = "medintel-backend"
version = "0.1.0"
description = "MedIntel AI backend — clinical intelligence platform API"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "sqlalchemy[asyncio]>=2.0",
    "alembic>=1.13",
    "asyncpg>=0.30",
    "bcrypt>=4.1",
    "python-jose[cryptography]>=3.3",
    "python-multipart>=0.0.9",
    "email-validator>=2.2",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "httpx>=0.27",
    "ruff>=0.7",
    "aiosqlite>=0.20",
]

[tool.uv]
package = false

[tool.ruff]
line-length = 100
target-version = "py312"
# Alembic migration scripts are autogenerated; don't lint generated code.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "C4"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
