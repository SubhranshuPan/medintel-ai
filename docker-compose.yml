# Local dev stack: FastAPI api + PostgreSQL + Qdrant.
#   docker compose up --build
# The api waits for a healthy Postgres, runs Alembic migrations, then serves.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medintel
      POSTGRES_PASSWORD: medintel
      POSTGRES_DB: medintel
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medintel -d medintel"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "5432:5432"

  qdrant:
    # Pin to a specific release; bump deliberately.
    image: qdrant/qdrant:v1.12.4
    volumes:
      - qdrantdata:/qdrant/storage
    ports:
      - "6333:6333"

  api:
    build: ./backend
    environment:
      MEDINTEL_ENVIRONMENT: development
      # Service name `postgres` resolves on the compose network.
      MEDINTEL_DATABASE_URL: postgresql+asyncpg://medintel:medintel@postgres:5432/medintel
      MEDINTEL_STORAGE_DIR: /app/storage/datasets
    volumes:
      - datasets:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    # Migrate then serve. `alembic`/`uvicorn` are on PATH from the image venv.
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    ports:
      - "8000:8000"

volumes:
  pgdata:
  qdrantdata:
  datasets:
